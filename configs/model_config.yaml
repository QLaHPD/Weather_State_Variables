forecast_model:
  source_model_path: assets/fuxi_teacher/short.onnx
  input_size: [181, 360]
  time_steps: 2
  in_chans: 70
  aux_chans: 5
  out_chans: 70
  forecast_steps: 2
  temb_dim: 12
  patch_size: [4, 4]
  embed_dim: 1024
  num_heads: 16
  window_size: 9
  depths: [8, 8, 8, 8]
  num_groups: 32
  mlp_hidden_dim: 2048
  device: meta
  dtype: float32

intrinsic_model:
  feature_channels: 1024
  resblocks_per_stage: [1, 1, 1]
  d_intrinsic: 6
  num_groups: 32
  apply_tanh: false
  device: meta
  dtype: float32

bottleneck_compressor_model:
  feature_source: second_block_features
  model_dim: 1024
  bottleneck_channels: 1
  num_heads: 32
  encoder_depth: 4
  decoder_depth: 4
  mlp_hidden_dim: 2048
  dropout: 0.0
  positional_embedding: learned_2d
  device: meta
  dtype: float32

data:
  dataset_url: /home/lemm2/ERA5_ZARR/arco_era5_fuxi_train.zarr
  input_time_offsets_hours: [-3, 0]
  lead_time_hours: 3
  forecast_steps: 2
  sample_stride_hours: 1
  pressure_levels: [50, 100, 150, 200, 250, 300, 400, 500, 600, 700, 850, 925, 1000]
  upper_air_variables: [geopotential, temperature, u_component_of_wind, v_component_of_wind, relative_humidity]
  surface_variables: [2m_temperature, 10m_u_component_of_wind, 10m_v_component_of_wind, mean_sea_level_pressure, total_precipitation]
  static_variables: [land_sea_mask, orography, cos_latitude, cos_longitude, sin_longitude]
  humidity_source: auto
  orography_source: geopotential_at_surface
  convert_geopotential_to_height: true
  latitude_descending: true
  include_sample_metadata: false
  dynamic_ram_cache_time_steps: 64
  dynamic_prefetch_block_time_steps: 8
  apply_normalization: true
  normalization_stats_path: runs/cache/era5_fuxi_normalization.json
  normalization_force_recompute: false
  normalization_fit_sample_count: 256
  gcs_token: anon

train_main:
  batch_size: 2
  num_workers: 16
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  weight_decay: 0.005
  max_epochs: 55
  device: auto
  model_dtype: float32
  use_amp: true
  amp_dtype: bfloat16
  forecast_loss: charbonnier
  charbonnier_epsilon: 1.0e-3
  upper_air_loss_weight: 1.0
  surface_loss_weight: 0.1
  gradient_clip_norm: null
  output_dir: /media/ramdisk/runs/main
  checkpoint_name: main_last.pt
  best_checkpoint_name: main_best.pt
  resume_checkpoint_path: null
  save_epoch_checkpoint: true
  save_best_checkpoint: true
  save_every_train_batches: 30000
  save_every_optimizer_steps: null
  train_start_time: 2000-01-01 00:00:00
  train_end_time: 2011-12-31 23:00:00
  val_start_time: 2012-01-01 00:00:00
  val_end_time: 2012-12-31 23:00:00
  max_train_batches: 300000
  max_val_batches: 1000
  log_every: 1
  print_model_summary: true
  summary_depth: 3
  random_smoke_batch_size: 1

train_intrinsic:
  batch_size: 4
  num_workers: 0
  gradient_accumulation_steps: 4
  learning_rate: 1.0e-4
  weight_decay: 0.05
  max_epochs: 20
  device: auto
  model_dtype: float32
  use_amp: true
  amp_dtype: bfloat16
  gradient_clip_norm: null
  output_dir: /media/ramdisk/runs/intrinsic
  checkpoint_name: intrinsic_last.pt
  best_checkpoint_name: intrinsic_best.pt
  resume_checkpoint_path: null
  save_epoch_checkpoint: true
  save_best_checkpoint: true
  save_every_train_batches: null
  save_every_optimizer_steps: null
  main_checkpoint_path: runs/main/main_best.pt
  detach_second_block_features: false
  train_start_time: 2000-01-01 00:00:00
  train_end_time: 2011-12-31 23:00:00
  val_start_time: 2012-01-01 00:00:00
  val_end_time: 2012-12-31 23:00:00
  max_train_batches: 100000
  max_val_batches: 100
  log_every: 1
  print_model_summary: true
  summary_depth: 3
  random_smoke_batch_size: 1

train_bottleneck_compressor:
  batch_size: 2
  num_workers: 0
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5
  weight_decay: 0.0
  max_epochs: 5
  device: auto
  model_dtype: float32
  use_amp: true
  amp_dtype: bfloat16
  gradient_clip_norm: 1.0
  output_dir: /media/ramdisk/runs/bottleneck_compressor
  checkpoint_name: bottleneck_compressor_last.pt
  best_checkpoint_name: bottleneck_compressor_best.pt
  resume_checkpoint_path: null
  save_epoch_checkpoint: true
  save_best_checkpoint: true
  save_every_train_batches: null
  save_every_optimizer_steps: null
  main_checkpoint_path: runs/main/main_best.pt
  detach_second_block_features: true
  train_start_time: 2000-01-01 00:00:00
  train_end_time: 2011-12-31 23:00:00
  val_start_time: 2012-01-01 00:00:00
  val_end_time: 2012-12-31 23:00:00
  max_train_batches: 100000
  max_val_batches: 100
  log_every: 1
  print_model_summary: true
  summary_depth: 3
  random_smoke_batch_size: 1
